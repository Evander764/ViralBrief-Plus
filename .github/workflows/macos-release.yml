name: macOS release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build signed macOS app
    runs-on: macos-15
    env:
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      MACOS_DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_PRIVATE_KEY_P8: ${{ secrets.APPLE_API_PRIVATE_KEY_P8 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate release secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 \
            MACOS_DEVELOPER_ID_APPLICATION_PASSWORD \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_API_PRIVATE_KEY_P8
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run tests
        run: npm test

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_DEVELOPER_ID_APPLICATION_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build, sign, and notarize app
        shell: bash
        env:
          VBP_MAC_SIGN_IDENTITY: Developer ID Application
          VBP_MAC_NOTARIZE: '1'
          VBP_NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          VBP_NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${VBP_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8" | perl -pe 's/\\n/\n/g' > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          VBP_NOTARY_KEY_PATH="$NOTARY_KEY_PATH" npm run package:mac

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viral-brief-plus-macos-release
          path: |
            dist/releases/*-mac.zip
            dist/releases/*-manifest.txt
          if-no-files-found: error

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/releases/*-mac.zip \
            dist/releases/*-manifest.txt \
            --draft \
            --title "Viral Brief Plus ${GITHUB_REF_NAME}" \
            --notes "macOS Developer ID signed and Apple-notarized build."
